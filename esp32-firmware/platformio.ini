; PlatformIO Project Configuration
; BMS ESP32 Firmware - Sensing and Master boards
;
; Flash sensing board:  pio run -e sensing -t upload
; Flash master board:   pio run -e master -t upload

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags = -I src -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    ; WiFi and HTTPClient are built-in for ESP32

[env:sensing]
build_src_filter = -<*> +<../sensing/src/>

[env:master]
build_src_filter = -<*> +<../master/src/>
